name: 'Terraform Plan and Apply'

on:
  workflow_dispatch:
    inputs:
      force_new:
        description: 'Create NEW resources with fresh random suffix'
        required: false
        default: 'false'
        type: boolean
  workflow_run:
    workflows: ['Terraform Test']
    types: [completed]

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_ACCESS_KEY }}
  DOTNET_VERSION: '6.0.x'

jobs:
  terraform_apply:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Force new random suffix
      if: github.event.inputs.force_new == 'true'
      run: |
        echo "🔄 Forcing new random suffix..."
        terraform init
        terraform state rm random_integer.ri || true
        rm -f terraform.tfstate*

    - name: Terraform Init & Apply
      run: |
        terraform init
        terraform apply -auto-approve

    - name: Get Web App Name
      id: webapp
      run: |
        WEBAPP_NAME=$(terraform output -raw web_app_name)
        echo "webapp_name=$WEBAPP_NAME" >> $GITHUB_OUTPUT
        echo "Web App Name: $WEBAPP_NAME"

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build and Publish App from HomiesActions
      run: |
        git clone https://github.com/vesfil/HomiesActions.git
        cd HomiesActions
        dotnet restore
        dotnet build --configuration Release --no-restore
        dotnet publish --configuration Release --output ../publish
        cd ..
        ls -la publish/

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ steps.webapp.outputs.webapp_name }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish

    - name: Verify deployment
      run: |
        echo "✅ Successfully deployed to: https://${{ steps.webapp.outputs.webapp_name }}.azurewebsites.net"