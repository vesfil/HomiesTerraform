name: 'Terraform Plan and Apply'

on:
  workflow_dispatch:
    inputs:
      force_new:
        description: 'Create new resources (yes/no)'
        required: true
        default: 'no'
        type: choice
        options:
          - yes
          - no
  workflow_run:
    workflows: ['Terraform Test']
    types: [completed]

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_ACCESS_KEY }}
  DOTNET_VERSION: '6.0.x'

jobs:
  terraform_apply:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Force New Resources
      if: github.event.inputs.force_new == 'yes'
      run: |
        echo "⚠️ FORCE NEW MODE - Destroying old resources..."
        terraform init
        terraform destroy -auto-approve || true
        terraform state rm random_integer.ri || true
        rm -f terraform.tfstate*
        echo "✅ Old resources destroyed"

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: terraform apply -auto-approve

    - name: Get Web App Name
      id: webapp
      run: |
        WEBAPP_NAME=$(terraform output -raw web_app_name)
        echo "webapp_name=$WEBAPP_NAME" >> $GITHUB_OUTPUT
        echo "Web App Name: $WEBAPP_NAME"

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build and Deploy HomiesActions
      run: |
        git clone https://github.com/vesfil/HomiesActions.git
        cd HomiesActions
        dotnet restore
        dotnet build --configuration Release --no-restore
        dotnet publish --configuration Release --output ../publish
        cd ..
        
        cd publish
        git init
        git add .
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        git commit -m "Deploy from GitHub Actions - $(date -u)"
        git branch -M master
        git push https://${{ secrets.AZURE_WEBAPP_DEPLOY_USER }}:${{ secrets.AZURE_WEBAPP_DEPLOY_PASSWORD }}@${{ steps.webapp.outputs.webapp_name }}.scm.azurewebsites.net/${{ steps.webapp.outputs.webapp_name }}.git master --force
        cd ..
        
        echo "✅ Deployed to: https://${{ steps.webapp.outputs.webapp_name }}.azurewebsites.net"