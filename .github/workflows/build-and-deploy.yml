name: 'Build and Deploy .NET App'

on:
  workflow_run:
    workflows: ['Terraform Plan and Apply']  # Изчаква Terraform да завърши
    types: [completed]
    branches: [main]
  workflow_dispatch:  # Позволява ръчно пускане

env:
  DOTNET_VERSION: '6.0.x'
  AZURE_WEBAPP_NAME: 'asp-homies-73297'  # Това ще се генерира динамично

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore ./YourApp.sln  # Промени с пътя до твоя .sln файл
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Test
      run: dotnet test --no-build --verbosity normal
    
    - name: Publish
      run: dotnet publish --configuration Release --output ./publish
    
    - name: Upload artifact for deployment
      uses: actions/upload-artifact@v4
      with:
        name: app-artifact
        path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
    - name: Download artifact from build
      uses: actions/download-artifact@v4
      with:
        name: app-artifact
        path: ./publish
    
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Get Web App Name from Terraform output
      run: |
        # Вземи името на web app-а от resource group
        WEBAPP_NAME=$(az webapp list --resource-group "rg-homies-73297" --query "[0].name" -o tsv)
        echo "WEBAPP_NAME=$WEBAPP_NAME" >> $GITHUB_ENV
        echo "Web App Name: $WEBAPP_NAME"
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
    
    - name: Verify deployment
      run: |
        echo "Deployment completed successfully!"
        echo "Your app is available at: https://${{ env.WEBAPP_NAME }}.azurewebsites.net"